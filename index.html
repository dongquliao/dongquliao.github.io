<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>東區瞭的音乐库</title>
    <link rel="icon" type="image/x-icon" href="https://dongquliaomusicdb-jsonandcovers.oss-cn-beijing.aliyuncs.com/favicon.ico">
    
    <!-- 外部库 -->
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.0/dist/chartjs-plugin-zoom.min.js"></script>
    
    <!-- CSS 模块 -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/charts.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="header-left">
                <h1>東區瞭的音乐库
                    <button class="stats-btn" id="statsBtn">📊 统计</button>
                </h1>
                <div class="update-info" id="updateInfo">加载中...</div>
            </div>
            
            <div class="source-card">
                <div class="source-card-title">这里当然是不能听的~ 歌曲来源：</div>
                <div class="source-card-line">
                    <span class="source-label">🎵 流媒体平台</span>
                    <span class="source-links">
                        <a href="https://www.kugou.com" target="_blank" rel="noopener noreferrer">酷狗音乐</a> /
                        <a href="https://music.163.com" target="_blank" rel="noopener noreferrer">网易云音乐</a> /
                        <a href="https://y.qq.com" target="_blank" rel="noopener noreferrer">QQ音乐</a>
                    </span>
                </div>
                <div class="source-card-line">
                    <span class="source-label">🎬 视频平台</span>
                    <span class="source-links">
                        <a href="https://www.bilibili.com" target="_blank" rel="noopener noreferrer">哔哩哔哩</a> /
                        <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">YouTube</a> /
                        <a href="https://www.nicovideo.jp" target="_blank" rel="noopener noreferrer">niconico</a>
                    </span>
                </div>
                <div class="source-card-line">
                    <span class="source-label">💽 独立发行专</span>
                    <span class="source-links">
                        <a href="https://dizzylab.net" target="_blank" rel="noopener noreferrer">dizzylab</a> /
                        <a href="https://www.taobao.com" target="_blank" rel="noopener noreferrer">淘宝</a> /
                        <a href="https://www.weidian.com" target="_blank" rel="noopener noreferrer">微店</a> /
                        <span class="source-more">...</span>
                    </span>
                </div>
                <div class="source-card-line">
                    <span class="source-label">🎹 自给自足</span>
                    <span class="source-links">是的主播几年前自己产了3首</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="all">全部</button>
        <button class="category-tab" data-category="人声">人声</button>
        <button class="category-tab" data-category="ボカロ">ボカロ</button>
        <button class="category-tab" data-category="纯音乐">纯音乐</button>
        <button class="category-tab" data-category="AI">AI</button>
    </div>
    <div class="controls">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索标题、艺术家、作曲、专辑...">
    </div>
</div>
    
    <div class="main-content">
        <div class="song-list-section">
            <table id="songTable">
                <thead><tr id="tableHeader"></tr></thead>
                <tbody id="songTableBody"></tbody>
            </table>
            <div id="loadingMore" class="loading-more" style="display: none;">加载更多...</div>
        </div>
        <div class="cover-section">
            <div class="cover-wrapper" id="coverWrapper">
                <div class="cover-card" id="coverCard">
                    <div class="cover-image" id="coverImage">
                        <div class="no-cover">无封面图片</div>
                    </div>
                    <div class="cover-info" id="coverInfo">
                        <p><strong>当前歌曲</strong><br>—</p>
                    </div>
                    <div class="stats-in-card" id="statsInCard" ondblclick="window.doubleClickStats?.()">加载中...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="statsModal" class="modal-stats">
    <div class="modal-stats-content">
        <div class="modal-stats-header">
            <h2 id="modalStatsTitle">📊 音乐库统计</h2>
            <span class="modal-stats-close" onclick="window.closeStatsModal?.()">&times;</span>
        </div>
        
        <div class="chart-tabs">
            <button class="chart-tab-btn active" data-chart="category">类别比例</button>
            <button class="chart-tab-btn" data-chart="year">年份分布</button>
            <button class="chart-tab-btn" data-chart="composer">P主歌曲数</button>
            <button class="chart-tab-btn" data-chart="virtual">歌姬歌曲数</button>
            <button class="chart-tab-btn" data-chart="singer">歌手歌曲数</button>
        </div>
        
        <div id="chartPanelCategory" class="chart-panel active">
            <div class="pie-chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
        
        <div id="chartPanelYear" class="chart-panel">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="window.zoomIn?.('yearChart')">放大 +</button>
                <button class="zoom-btn" onclick="window.zoomOut?.('yearChart')">缩小 -</button>
                <button class="zoom-btn" onclick="window.resetZoom?.('yearChart')">重置</button>
                <span style="font-size:11px; color:#888;">💡 鼠标拖拽平移 | Ctrl+滚轮缩放</span>
            </div>
            <div class="chart-container">
                <canvas id="yearChart"></canvas>
            </div>
        </div>
        
        <div id="chartPanelComposer" class="chart-panel">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="window.zoomIn?.('composerChart')">放大 +</button>
                <button class="zoom-btn" onclick="window.zoomOut?.('composerChart')">缩小 -</button>
                <button class="zoom-btn" onclick="window.resetZoom?.('composerChart')">重置</button>
                <span style="font-size:11px; color:#888;">💡 鼠标拖拽平移 | Ctrl+滚轮缩放</span>
            </div>
            <div class="chart-container" style="overflow-y: auto;">
                <canvas id="composerChart"></canvas>
            </div>
        </div>
        
        <div id="chartPanelVirtual" class="chart-panel">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="window.zoomIn?.('virtualSingerChart')">放大 +</button>
                <button class="zoom-btn" onclick="window.zoomOut?.('virtualSingerChart')">缩小 -</button>
                <button class="zoom-btn" onclick="window.resetZoom?.('virtualSingerChart')">重置</button>
                <span style="font-size:11px; color:#888;">💡 鼠标拖拽平移 | Ctrl+滚轮缩放</span>
            </div>
            <div class="chart-container" style="overflow-y: auto;">
                <canvas id="virtualSingerChart"></canvas>
            </div>
        </div>
        
        <div id="chartPanelSinger" class="chart-panel">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="window.zoomIn?.('singerChart')">放大 +</button>
                <button class="zoom-btn" onclick="window.zoomOut?.('singerChart')">缩小 -</button>
                <button class="zoom-btn" onclick="window.resetZoom?.('singerChart')">重置</button>
                <span style="font-size:11px; color:#888;">💡 鼠标拖拽平移 | Ctrl+滚轮缩放</span>
            </div>
            <div class="chart-container" style="overflow-y: auto;">
                <canvas id="singerChart"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="lyricModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">歌词</h3>
            <span class="close" onclick="window.closeLyricModal?.()">&times;</span>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<!-- JS 模块 (type="module") -->
<script type="module" src="js/main.js"></script>
</body>
</html>
